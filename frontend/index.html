<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700&family=Frank+Ruhl+Libre:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <title>פלטפורמת ניהול תיקים משפטיים</title>
    <script>
      // Apply the persisted theme (see useTheme in src/theme.ts) before React
      // mounts, so every page - not just the ones that render a
      // ThemeToggle - starts in the right theme on a fresh load instead of
      // flashing light mode first.
      (function () {
        try {
          var stored = localStorage.getItem("legal_platform_theme");
          document.documentElement.setAttribute(
            "data-theme",
            stored === "dark" ? "dark" : "light"
          );
        } catch (e) {
          /* localStorage unavailable - keep default light styling */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

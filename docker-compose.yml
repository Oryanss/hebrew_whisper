services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET_KEY: dev-only-secret-change-me
      DATABASE_URL: sqlite:////app/data/legal_platform.db
      CORS_ORIGINS: http://localhost:5173
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - backend_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
